services:
  # Backend + Frontend (single service)
  - type: web
    name: underground
    runtime: node
    buildCommand: npm install && npm run build && cp -r dist server/ && cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://underground-qlgh.onrender.com
    disk:
      name: underground-data
      mountPath: /data
      sizeGB: 1
